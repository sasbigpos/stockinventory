<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Inventory Tracker</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #0a0a18; color: #f0ede8; font-family: system-ui, -apple-system, sans-serif; }
    input[type="date"]::-webkit-calendar-picker-indicator,
    input[type="datetime-local"]::-webkit-calendar-picker-indicator { filter: invert(0.6); cursor: pointer; }
    select option { background: #1a1a2e; color: #f0ede8; }
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #ffffff22; border-radius: 99px; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useRef, useCallback } = React;


const CATEGORIES = ["Electronics", "Food & Drink", "Office", "Clothing", "Tools", "Other"];
const initialLocations = [
  { id: "A", name: "Warehouse A" },
  { id: "B", name: "Warehouse B" },
];
const initialItems = [
  { id: 1, name: "Wireless Headphones", category: "Electronics", image: null, low: 5,  stock: { A: 14, B: 3  } },
  { id: 2, name: "Coffee Beans (1kg)",  category: "Food & Drink", image: null, low: 10, stock: { A: 3,  B: 20 } },
  { id: 3, name: "Desk Lamp",           category: "Office",       image: null, low: 4,  stock: { A: 8,  B: 5  } },
];

const inputStyle = {
  background: "#ffffff0a", border: "1px solid #ffffff18", borderRadius: 10,
  padding: "10px 14px", color: "#f0ede8", fontSize: 14, outline: "none", width: "100%",
  fontFamily: "inherit", boxSizing: "border-box",
};
const labelStyle = { display: "flex", flexDirection: "column", gap: 6, fontSize: 12, color: "#888", letterSpacing: 0.5 };
const btnStyle = {
  border: "none", borderRadius: 12, padding: "12px 20px", cursor: "pointer",
  fontFamily: "inherit", fontWeight: 700, fontSize: 13, transition: "all 0.15s",
};
const LOC_COLORS = { A: "#6c63ff", B: "#f59e0b" };

// ─── Badges ──────────────────────────────────────────────────────────────────
function QuantityBadge({ qty, low }) {
  const status = qty === 0 ? "out" : qty <= low ? "low" : "ok";
  const colors = { out: "#ff3b30", low: "#ff9500", ok: "#34c759" };
  return (
    <span style={{
      display: "inline-flex", alignItems: "center", gap: 5,
      background: colors[status] + "22", color: colors[status],
      border: `1px solid ${colors[status]}44`,
      borderRadius: 99, padding: "2px 10px", fontSize: 12, fontWeight: 700, fontFamily: "monospace",
    }}>
      <span style={{ width: 6, height: 6, borderRadius: "50%", background: colors[status], display: "inline-block" }} />
      {qty}
    </span>
  );
}

// ─── Image Upload ─────────────────────────────────────────────────────────────
function ImageUpload({ image, onChange }) {
  const ref = useRef();
  const handleFile = useCallback((file) => {
    if (!file) return;
    const reader = new FileReader();
    reader.onload = ev => onChange(ev.target.result);
    reader.readAsDataURL(file);
  }, [onChange]);
  return (
    <div onClick={() => ref.current.click()}
      onDrop={e => { e.preventDefault(); handleFile(e.dataTransfer?.files?.[0]); }}
      onDragOver={e => e.preventDefault()}
      style={{
        width: 110, height: 110, borderRadius: 16, cursor: "pointer", flexShrink: 0,
        background: image ? "transparent" : "#1a1a2e",
        border: image ? "none" : "2px dashed #ffffff22",
        display: "flex", alignItems: "center", justifyContent: "center", overflow: "hidden",
      }}>
      {image
        ? <img src={image} alt="" style={{ width: "100%", height: "100%", objectFit: "cover" }} />
        : <svg width="22" height="22" fill="none" stroke="#ffffff44" strokeWidth="1.5" viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="3"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="M21 15l-5-5L5 21"/></svg>
      }
      <input ref={ref} type="file" accept="image/*" style={{ display: "none" }} onChange={e => handleFile(e.target.files?.[0])} />
    </div>
  );
}

// ─── Editable Tab Name ────────────────────────────────────────────────────────
function EditableTabName({ loc, color, onRename }) {
  const [editing, setEditing] = useState(false);
  const [val, setVal] = useState(loc.name);
  const commit = () => { if (val.trim()) onRename(loc.id, val.trim()); setEditing(false); };
  return editing ? (
    <input autoFocus value={val} onChange={e => setVal(e.target.value)}
      onBlur={commit} onKeyDown={e => e.key === "Enter" && commit()}
      style={{ ...inputStyle, padding: "4px 8px", fontSize: 14, width: 130, borderColor: color + "99" }} />
  ) : (
    <span style={{ display: "flex", alignItems: "center", gap: 5 }}>
      {loc.name}
      <span onClick={e => { e.stopPropagation(); setEditing(true); }} title="Rename"
        style={{ cursor: "pointer", opacity: 0.5, display: "flex", alignItems: "center" }}>
        <svg width="11" height="11" fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24"><path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
      </span>
    </span>
  );
}

// ─── Item Modal ───────────────────────────────────────────────────────────────
function ItemModal({ item, locations, onSave, onClose }) {
  const initStock = locations.reduce((acc, l) => ({ ...acc, [l.id]: item?.stock?.[l.id] ?? 0 }), {});
  const [form, setForm] = useState(item ? { ...item, stock: { ...initStock } } : { name: "", category: "Electronics", image: null, low: 5, stock: initStock });
  const set = (k, v) => setForm(f => ({ ...f, [k]: v }));

  return (
    <div style={{ position: "fixed", inset: 0, background: "rgba(0,0,0,0.75)", backdropFilter: "blur(8px)", display: "flex", alignItems: "center", justifyContent: "center", zIndex: 100, padding: 20 }} onClick={onClose}>
      <div onClick={e => e.stopPropagation()} style={{ background: "#10101e", border: "1px solid #ffffff18", borderRadius: 24, padding: 32, width: "100%", maxWidth: 460, boxShadow: "0 40px 80px rgba(0,0,0,0.6)" }}>
        <h2 style={{ margin: "0 0 24px", fontSize: 22, color: "#f0ede8" }}>{item ? "Edit Item" : "New Item"}</h2>
        <div style={{ display: "flex", gap: 16, marginBottom: 18 }}>
          <ImageUpload image={form.image} onChange={v => set("image", v)} />
          <div style={{ flex: 1, display: "flex", flexDirection: "column", gap: 10 }}>
            <input value={form.name} onChange={e => set("name", e.target.value)} placeholder="Item name…" style={inputStyle} />
            <div>
              <input list="cat-list" value={form.category} onChange={e => set("category", e.target.value)} placeholder="Category…" style={inputStyle} />
              <datalist id="cat-list">{CATEGORIES.map(c => <option key={c} value={c} />)}</datalist>
            </div>
          </div>
        </div>
        <div style={{ marginBottom: 18 }}>
          <div style={{ fontSize: 12, color: "#888", marginBottom: 10, letterSpacing: 0.5 }}>STOCK PER LOCATION</div>
          <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10 }}>
            {locations.map(loc => (
              <label key={loc.id} style={labelStyle}>
                <span style={{ display: "flex", alignItems: "center", gap: 6 }}>
                  <span style={{ width: 8, height: 8, borderRadius: "50%", background: LOC_COLORS[loc.id] || "#aaa", display: "inline-block" }} />
                  {loc.name}
                </span>
                <input type="number" min={0} value={form.stock[loc.id]} onChange={e => set("stock", { ...form.stock, [loc.id]: +e.target.value })} style={inputStyle} />
              </label>
            ))}
          </div>
        </div>
        <label style={{ ...labelStyle, marginBottom: 24 }}>
          <span>Low stock alert (total)</span>
          <input type="number" value={form.low} min={0} onChange={e => set("low", +e.target.value)} style={inputStyle} />
        </label>
        <div style={{ display: "flex", gap: 10 }}>
          <button onClick={onClose} style={{ ...btnStyle, background: "#ffffff0f", color: "#aaa", flex: 1 }}>Cancel</button>
          <button onClick={() => { if (form.name) onSave(form); }} style={{ ...btnStyle, background: "linear-gradient(135deg,#6c63ff,#a78bfa)", color: "#fff", flex: 2 }}>Save Item</button>
        </div>
      </div>
    </div>
  );
}

// ─── Transfer Modal ───────────────────────────────────────────────────────────
function TransferModal({ item, locations, defaultFrom, onTransfer, onClose }) {
  const otherLoc = locations.find(l => l.id !== defaultFrom)?.id ?? locations[1].id;
  const [from, setFrom]   = useState(defaultFrom ?? locations[0].id);
  const [to, setTo]       = useState(otherLoc);
  const [qty, setQty]     = useState(1);
  const [error, setError] = useState("");

  const fromLoc   = locations.find(l => l.id === from);
  const available = item.stock[from] ?? 0;
  const handleSwap = () => { setFrom(to); setTo(from); setError(""); };
  const handleTransfer = () => {
    if (from === to)     return setError("Source and destination must differ.");
    if (qty <= 0)        return setError("Quantity must be at least 1.");
    if (qty > available) return setError(`Only ${available} units available in ${fromLoc.name}.`);
    onTransfer(item.id, from, to, qty);
  };

  return (
    <div style={{ position: "fixed", inset: 0, background: "rgba(0,0,0,0.75)", backdropFilter: "blur(8px)", display: "flex", alignItems: "center", justifyContent: "center", zIndex: 100, padding: 20 }} onClick={onClose}>
      <div onClick={e => e.stopPropagation()} style={{ background: "#10101e", border: "1px solid #ffffff18", borderRadius: 24, padding: 32, width: "100%", maxWidth: 420, boxShadow: "0 40px 80px rgba(0,0,0,0.6)" }}>
        <div style={{ fontSize: 11, color: "#f59e0b", letterSpacing: 3, textTransform: "uppercase", marginBottom: 6, fontWeight: 600 }}>Transfer Stock</div>
        <h2 style={{ margin: "0 0 4px", fontSize: 20, color: "#f0ede8" }}>{item.name}</h2>
        <div style={{ fontSize: 12, color: "#555", marginBottom: 24 }}>{item.category}</div>

        <div style={{ display: "flex", alignItems: "flex-start", gap: 10, marginBottom: 20 }}>
          <div style={{ flex: 1 }}>
            <div style={{ fontSize: 11, color: "#888", marginBottom: 6 }}>FROM</div>
            <select value={from} onChange={e => { setFrom(e.target.value); setError(""); }} style={{ ...inputStyle, cursor: "pointer" }}>
              {locations.map(l => <option key={l.id} value={l.id} style={{ background: "#1a1a2e" }}>{l.name}</option>)}
            </select>
            <div style={{ fontSize: 11, color: "#555", marginTop: 6 }}>Available: <span style={{ color: LOC_COLORS[from] || "#aaa", fontWeight: 700 }}>{available}</span></div>
          </div>
          <button onClick={handleSwap} style={{ width: 38, height: 38, borderRadius: 10, border: "1px solid #ffffff18", background: "#ffffff0a", color: "#fff", cursor: "pointer", flexShrink: 0, display: "flex", alignItems: "center", justifyContent: "center", marginTop: 22 }}>
            <svg width="16" height="16" fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24"><path d="M7 16V4m0 0L3 8m4-4l4 4M17 8v12m0 0l4-4m-4 4l-4-4"/></svg>
          </button>
          <div style={{ flex: 1 }}>
            <div style={{ fontSize: 11, color: "#888", marginBottom: 6 }}>TO</div>
            <select value={to} onChange={e => { setTo(e.target.value); setError(""); }} style={{ ...inputStyle, cursor: "pointer" }}>
              {locations.map(l => <option key={l.id} value={l.id} style={{ background: "#1a1a2e" }}>{l.name}</option>)}
            </select>
            <div style={{ fontSize: 11, color: "#555", marginTop: 6 }}>Current: <span style={{ color: LOC_COLORS[to] || "#aaa", fontWeight: 700 }}>{item.stock[to] ?? 0}</span></div>
          </div>
        </div>

        <label style={{ ...labelStyle, marginBottom: 16 }}>
          <span>Quantity to transfer</span>
          <input type="number" min={1} max={available} value={qty} onChange={e => { setQty(+e.target.value); setError(""); }} style={inputStyle} />
        </label>

        {error && <div style={{ fontSize: 13, color: "#ff3b30", marginBottom: 14, background: "#ff3b3011", borderRadius: 8, padding: "8px 12px", border: "1px solid #ff3b3033" }}>{error}</div>}

        <div style={{ display: "flex", gap: 8, marginBottom: 20 }}>
          {[from, to].map(locId => {
            const loc   = locations.find(l => l.id === locId);
            const after = locId === from ? Math.max(0, (item.stock[from] ?? 0) - qty) : (item.stock[to] ?? 0) + qty;
            const color = LOC_COLORS[locId] || "#aaa";
            return (
              <div key={locId} style={{ flex: 1, background: color + "0d", borderRadius: 12, padding: "10px 14px", border: `1px solid ${color}33` }}>
                <div style={{ fontSize: 11, color, fontWeight: 700, marginBottom: 4 }}>{loc.name}</div>
                <div style={{ fontFamily: "monospace", fontSize: 20, fontWeight: 700 }}>{after}</div>
                <div style={{ fontSize: 11, color: "#555" }}>after transfer</div>
              </div>
            );
          })}
        </div>

        <div style={{ display: "flex", gap: 10 }}>
          <button onClick={onClose} style={{ ...btnStyle, background: "#ffffff0f", color: "#aaa", flex: 1 }}>Cancel</button>
          <button onClick={handleTransfer} style={{ ...btnStyle, background: "linear-gradient(135deg,#f59e0b,#fbbf24)", color: "#000", flex: 2 }}>Confirm Transfer</button>
        </div>
      </div>
    </div>
  );
}

// ─── Transfer Log View ────────────────────────────────────────────────────────
function TransferLogView({ log, locations, items, onClear }) {
  const toISOLocal = (d) => {
    const pad = n => String(n).padStart(2, "0");
    return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}T${pad(d.getHours())}:${pad(d.getMinutes())}`;
  };
  const startOfDay = (d) => { const n = new Date(d); n.setHours(0,0,0,0); return n; };
  const endOfDay   = (d) => { const n = new Date(d); n.setHours(23,59,59,999); return n; };

  const [dtFrom, setDtFrom] = useState("");
  const [dtTo,   setDtTo]   = useState("");
  const [preset, setPreset] = useState("all");

  const applyPreset = (p) => {
    setPreset(p);
    const now = new Date();
    if (p === "today") {
      setDtFrom(toISOLocal(startOfDay(now)));
      setDtTo(toISOLocal(endOfDay(now)));
    } else if (p === "week") {
      const start = new Date(now); start.setDate(now.getDate() - 6);
      setDtFrom(toISOLocal(startOfDay(start)));
      setDtTo(toISOLocal(endOfDay(now)));
    } else if (p === "month") {
      const start = new Date(now.getFullYear(), now.getMonth(), 1);
      setDtFrom(toISOLocal(startOfDay(start)));
      setDtTo(toISOLocal(endOfDay(now)));
    } else {
      setDtFrom(""); setDtTo("");
    }
  };

  const filtered = [...log].reverse().filter(entry => {
    if (!dtFrom && !dtTo) return true;
    const ts = entry.timestamp;
    if (dtFrom && ts < new Date(dtFrom).getTime()) return false;
    if (dtTo   && ts > new Date(dtTo).getTime())   return false;
    return true;
  });

  const totalQty = filtered.reduce((s, e) => s + e.qty, 0);

  const fmt = (ts) => {
    const d = new Date(ts);
    return d.toLocaleDateString(undefined, { month: "short", day: "numeric", year: "numeric" })
      + "  " + d.toLocaleTimeString(undefined, { hour: "2-digit", minute: "2-digit", second: "2-digit" });
  };

  const PRESETS = [
    { id: "all",    label: "All time"    },
    { id: "today",  label: "Today"       },
    { id: "week",   label: "Last 7 days" },
    { id: "month",  label: "This month"  },
    { id: "custom", label: "Custom"      },
  ];

  const dtInputStyle = { ...inputStyle, width: "auto", padding: "6px 10px", fontSize: 12, colorScheme: "dark" };

  return (
    <div style={{ maxWidth: 1000, margin: "24px auto 60px", padding: "0 32px" }}>
      {/* Header */}
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", marginBottom: 24, flexWrap: "wrap", gap: 12 }}>
        <div>
          <div style={{ fontSize: 11, color: "#f59e0b", letterSpacing: 3, textTransform: "uppercase", fontWeight: 600, marginBottom: 4 }}>Audit Trail</div>
          <div style={{ fontSize: 22, fontWeight: 700 }}>Transfer Log
            {log.length > 0 && <span style={{ marginLeft: 10, fontSize: 13, fontFamily: "monospace", color: "#555", fontWeight: 400 }}>{log.length} total entries</span>}
          </div>
        </div>
        {log.length > 0 && (
          <button onClick={onClear} style={{ ...btnStyle, background: "#ff3b3011", color: "#ff3b30", padding: "8px 18px", fontSize: 12, border: "1px solid #ff3b3033" }}>
            Clear All
          </button>
        )}
      </div>

      {log.length === 0 ? (
        <div style={{ textAlign: "center", padding: "80px 0" }}>
          <div style={{ fontSize: 48, marginBottom: 14 }}>📋</div>
          <div style={{ fontFamily: "monospace", fontSize: 15, color: "#555" }}>No transfers recorded yet</div>
          <div style={{ fontSize: 12, color: "#333", marginTop: 6 }}>Use the Transfer button on any item to move stock between locations</div>
        </div>
      ) : (<>

        {/* ── Filter Bar ── */}
        <div style={{ background: "#ffffff06", border: "1px solid #ffffff0e", borderRadius: 18, padding: "16px 20px", marginBottom: 20 }}>
          {/* Row 1: icon + presets + summary */}
          <div style={{ display: "flex", gap: 12, flexWrap: "wrap", alignItems: "center", marginBottom: preset === "custom" ? 14 : 0 }}>
            <svg width="15" height="15" fill="none" stroke="#f59e0b" strokeWidth="2" viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/></svg>
            <div style={{ display: "flex", gap: 5, flexWrap: "wrap", flex: 1 }}>
              {PRESETS.map(p => (
                <button key={p.id} onClick={() => applyPreset(p.id)} style={{
                  ...btnStyle, padding: "5px 12px", fontSize: 11, borderRadius: 99,
                  background: preset === p.id ? "#f59e0b" : "#ffffff0a",
                  color: preset === p.id ? "#000" : "#666",
                  border: `1px solid ${preset === p.id ? "#f59e0b" : "#ffffff15"}`,
                  fontWeight: preset === p.id ? 700 : 500,
                }}>{p.label}</button>
              ))}
            </div>
            {/* Summary */}
            <div style={{ display: "flex", gap: 16, flexShrink: 0 }}>
              <div style={{ textAlign: "center" }}>
                <div style={{ fontFamily: "monospace", fontWeight: 700, fontSize: 18, color: "#f59e0b" }}>{filtered.length}</div>
                <div style={{ fontSize: 10, color: "#444", textTransform: "uppercase", letterSpacing: 0.5 }}>Transfers</div>
              </div>
              <div style={{ width: 1, background: "#ffffff0e" }} />
              <div style={{ textAlign: "center" }}>
                <div style={{ fontFamily: "monospace", fontWeight: 700, fontSize: 18, color: "#a78bfa" }}>{totalQty}</div>
                <div style={{ fontSize: 10, color: "#444", textTransform: "uppercase", letterSpacing: 0.5 }}>Units Moved</div>
              </div>
            </div>
          </div>

          {/* Row 2: datetime pickers (custom only) */}
          {preset === "custom" && (
            <div style={{ display: "flex", gap: 10, flexWrap: "wrap", alignItems: "center", borderTop: "1px solid #ffffff0a", paddingTop: 14 }}>
              <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
                <span style={{ fontSize: 11, color: "#888", width: 24, textAlign: "right" }}>From</span>
                <input type="datetime-local" value={dtFrom} onChange={e => { setDtFrom(e.target.value); }}
                  style={dtInputStyle} />
              </div>
              <svg width="16" height="8" fill="none" stroke="#444" strokeWidth="1.5" viewBox="0 0 16 8"><path d="M0 4h12M8 1l4 3-4 3" strokeLinecap="round" strokeLinejoin="round"/></svg>
              <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
                <span style={{ fontSize: 11, color: "#888", width: 12 }}>To</span>
                <input type="datetime-local" value={dtTo} onChange={e => { setDtTo(e.target.value); }}
                  style={dtInputStyle} />
              </div>
              {(dtFrom || dtTo) && (
                <button onClick={() => { setDtFrom(""); setDtTo(""); }} style={{ ...btnStyle, padding: "5px 10px", fontSize: 11, background: "#ffffff0a", color: "#666", border: "1px solid #ffffff15", borderRadius: 8 }}>
                  Reset
                </button>
              )}
              {dtFrom && dtTo && (
                <span style={{ fontSize: 11, color: "#555", fontFamily: "monospace", marginLeft: 4 }}>
                  {Math.round((new Date(dtTo) - new Date(dtFrom)) / 3600000 * 10) / 10}h window
                </span>
              )}
            </div>
          )}
        </div>

        {/* ── Table ── */}
        {filtered.length === 0 ? (
          <div style={{ textAlign: "center", padding: "48px 0", color: "#444" }}>
            <div style={{ fontSize: 32, marginBottom: 10 }}>🔍</div>
            <div style={{ fontFamily: "monospace", fontSize: 13 }}>No transfers in this range</div>
          </div>
        ) : (
          <div style={{ border: "1px solid #ffffff0e", borderRadius: 20, overflow: "hidden" }}>
            <div style={{ display: "grid", gridTemplateColumns: "2fr 1.5fr 2fr 1fr 1.8fr", gap: 16, padding: "12px 20px", background: "#ffffff05", borderBottom: "1px solid #ffffff0e" }}>
              {["Item", "From", "To", "Qty", "Date & Time"].map(h => (
                <div key={h} style={{ fontSize: 11, color: "#444", fontWeight: 700, textTransform: "uppercase", letterSpacing: 0.8 }}>{h}</div>
              ))}
            </div>

            {filtered.map((entry, i) => {
              const item      = items.find(it => it.id === entry.itemId);
              const fromLoc   = locations.find(l => l.id === entry.from);
              const toLoc     = locations.find(l => l.id === entry.to);
              const fromColor = LOC_COLORS[entry.from] || "#aaa";
              const toColor   = LOC_COLORS[entry.to]   || "#aaa";

              return (
                <div key={entry.id} style={{
                  display: "grid", gridTemplateColumns: "2fr 1.5fr 2fr 1fr 1.8fr", gap: 16,
                  padding: "14px 20px", alignItems: "center",
                  borderBottom: i < filtered.length - 1 ? "1px solid #ffffff08" : "none",
                  background: i === 0 && preset === "all" ? "#f59e0b05" : "transparent",
                }}>
                  <div style={{ display: "flex", alignItems: "center", gap: 10, minWidth: 0 }}>
                    <div style={{ width: 36, height: 36, borderRadius: 9, flexShrink: 0, overflow: "hidden", background: "linear-gradient(135deg,#1e1e3a,#2a1a4a)", display: "flex", alignItems: "center", justifyContent: "center" }}>
                      {item?.image ? <img src={item.image} alt="" style={{ width: "100%", height: "100%", objectFit: "cover" }} /> : <span style={{ fontSize: 16 }}>📦</span>}
                    </div>
                    <div style={{ minWidth: 0 }}>
                      <div style={{ fontSize: 13, fontWeight: 600, whiteSpace: "nowrap", overflow: "hidden", textOverflow: "ellipsis" }}>{item?.name ?? "Deleted item"}</div>
                      <div style={{ fontSize: 10, color: "#555", textTransform: "uppercase", letterSpacing: 0.4 }}>{item?.category ?? "—"}</div>
                    </div>
                  </div>

                  <div style={{ display: "flex", alignItems: "center", gap: 6 }}>
                    <span style={{ width: 8, height: 8, borderRadius: "50%", background: fromColor, flexShrink: 0 }} />
                    <span style={{ fontSize: 13, color: fromColor, fontWeight: 600 }}>{fromLoc?.name ?? entry.from}</span>
                  </div>

                  <div style={{ display: "flex", alignItems: "center", gap: 6 }}>
                    <svg width="14" height="8" viewBox="0 0 16 8" fill="none" stroke="#333" strokeWidth="1.5"><path d="M0 4h12M8 1l4 3-4 3" strokeLinecap="round" strokeLinejoin="round"/></svg>
                    <span style={{ width: 8, height: 8, borderRadius: "50%", background: toColor, flexShrink: 0 }} />
                    <span style={{ fontSize: 13, color: toColor, fontWeight: 600 }}>{toLoc?.name ?? entry.to}</span>
                  </div>

                  <div style={{ fontFamily: "monospace", fontWeight: 700, fontSize: 16, color: "#f59e0b" }}>×{entry.qty}</div>

                  <div style={{ fontSize: 11, color: "#555", fontFamily: "monospace", lineHeight: 1.6 }}>
                    <div style={{ color: "#aaa" }}>{new Date(entry.timestamp).toLocaleDateString(undefined, { month: "short", day: "numeric", year: "numeric" })}</div>
                    <div style={{ color: "#f59e0b88" }}>{new Date(entry.timestamp).toLocaleTimeString(undefined, { hour: "2-digit", minute: "2-digit", second: "2-digit" })}</div>
                  </div>
                </div>
              );
            })}
          </div>
        )}
      </>)}
    </div>
  );
}

// ─── Report View ──────────────────────────────────────────────────────────────
function ReportView({ log, locations, items }) {
  const toISOLocal = (d) => {
    const pad = n => String(n).padStart(2, "0");
    return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}T${pad(d.getHours())}:${pad(d.getMinutes())}`;
  };
  const startOfDay = (d) => { const n = new Date(d); n.setHours(0,0,0,0); return n; };
  const endOfDay   = (d) => { const n = new Date(d); n.setHours(23,59,59,999); return n; };

  const [dtFrom, setDtFrom] = useState("");
  const [dtTo,   setDtTo]   = useState("");
  const [preset, setPreset] = useState("all");

  const applyPreset = (p) => {
    setPreset(p);
    const now = new Date();
    if (p === "today") {
      setDtFrom(toISOLocal(startOfDay(now))); setDtTo(toISOLocal(endOfDay(now)));
    } else if (p === "week") {
      const s = new Date(now); s.setDate(now.getDate() - 6);
      setDtFrom(toISOLocal(startOfDay(s))); setDtTo(toISOLocal(endOfDay(now)));
    } else if (p === "month") {
      setDtFrom(toISOLocal(startOfDay(new Date(now.getFullYear(), now.getMonth(), 1)))); setDtTo(toISOLocal(endOfDay(now)));
    } else { setDtFrom(""); setDtTo(""); }
  };

  const inRange = (entry) => {
    if (!dtFrom && !dtTo) return true;
    if (dtFrom && entry.timestamp < new Date(dtFrom).getTime()) return false;
    if (dtTo   && entry.timestamp > new Date(dtTo).getTime())   return false;
    return true;
  };

  const filteredLog = log.filter(inRange);

  // ── Build item-level summary ──
  // For each item × (from→to) pair, sum qty
  const summaryMap = {};
  filteredLog.forEach(entry => {
    const key = `${entry.itemId}__${entry.from}__${entry.to}`;
    if (!summaryMap[key]) summaryMap[key] = { itemId: entry.itemId, from: entry.from, to: entry.to, qty: 0, count: 0 };
    summaryMap[key].qty   += entry.qty;
    summaryMap[key].count += 1;
  });

  // Group by item, collecting all direction rows
  const byItem = {};
  Object.values(summaryMap).forEach(row => {
    if (!byItem[row.itemId]) byItem[row.itemId] = { itemId: row.itemId, directions: [], totalQty: 0 };
    byItem[row.itemId].directions.push(row);
    byItem[row.itemId].totalQty += row.qty;
  });

  const reportRows = Object.values(byItem).sort((a, b) => b.totalQty - a.totalQty);

  const grandTotal   = filteredLog.reduce((s, e) => s + e.qty, 0);
  const uniqueItems  = reportRows.length;

  const PRESETS = [
    { id: "all", label: "All time" }, { id: "today", label: "Today" },
    { id: "week", label: "Last 7 days" }, { id: "month", label: "This month" },
    { id: "custom", label: "Custom" },
  ];
  const dtInputStyle = { ...inputStyle, width: "auto", padding: "6px 10px", fontSize: 12, colorScheme: "dark" };

  const buildCSV = () => {
    const rows = [];
    rows.push(["Item", "Category", "From", "To", "Transfers", "Units Moved", "% of Total"]);
    reportRows.forEach(row => {
      const item = items.find(it => it.id === row.itemId);
      const pct  = grandTotal > 0 ? ((row.totalQty / grandTotal) * 100).toFixed(1) : "0.0";
      row.directions.forEach((dir, i) => {
        const fromLoc = locations.find(l => l.id === dir.from);
        const toLoc   = locations.find(l => l.id === dir.to);
        rows.push([
          i === 0 ? (item?.name ?? `Item #${row.itemId}`) : "",
          i === 0 ? (item?.category ?? "") : "",
          fromLoc?.name ?? dir.from,
          toLoc?.name   ?? dir.to,
          dir.count, dir.qty,
          i === 0 ? `${pct}%` : "",
        ]);
      });
      if (row.directions.length > 1) {
        const pct = grandTotal > 0 ? ((row.totalQty / grandTotal) * 100).toFixed(1) : "0.0";
        rows.push(["", "", "", "SUBTOTAL", row.directions.reduce((s,d)=>s+d.count,0), row.totalQty, `${pct}%`]);
      }
    });
    rows.push([]);
    rows.push(["GRAND TOTAL", "", "", "", filteredLog.length, grandTotal, "100%"]);
    rows.push([]);
    rows.push(["Report period", dtFrom ? new Date(dtFrom).toLocaleString() : "All time", dtTo ? new Date(dtTo).toLocaleString() : ""]);
    rows.push(["Generated", new Date().toLocaleString()]);
    return rows.map(r => r.map(cell => `"${String(cell).replace(/"/g,'""')}"`).join(",")).join("\n");
  };

  const exportCSV = () => {
    const csv      = buildCSV();
    const filename = `transfer-report-${new Date().toISOString().slice(0,10)}.csv`;
    // Open CSV in a new tab — user can File > Save As to download
    const win = window.open("", "_blank");
    if (win) {
      win.document.write(`<html><head><title>${filename}</title></head><body><pre style="font-family:monospace;font-size:13px;white-space:pre">${csv.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;")}</pre><p style="font-family:sans-serif;color:#888;font-size:12px">Press <b>Ctrl+S</b> (or Cmd+S) to save this file as CSV.</p></body></html>`);
      win.document.close();
    }
  };

  return (
    <div style={{ maxWidth: 1000, margin: "24px auto 60px", padding: "0 32px" }}>

      {/* Header */}
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", marginBottom: 24, flexWrap: "wrap", gap: 12 }}>
        <div>
          <div style={{ fontSize: 11, color: "#34c759", letterSpacing: 3, textTransform: "uppercase", fontWeight: 600, marginBottom: 4 }}>Analytics</div>
          <div style={{ fontSize: 22, fontWeight: 700 }}>Transfer Report</div>
          <div style={{ fontSize: 13, color: "#555", marginTop: 4 }}>Quantity transferred between locations, summarised by item</div>
        </div>
        {reportRows.length > 0 && (
          <button onClick={exportCSV} style={{
            ...btnStyle, background: "#34c75918", color: "#34c759",
            padding: "10px 20px", fontSize: 13, border: "1px solid #34c75944",
            display: "flex", alignItems: "center", gap: 8,
          }}>
            <svg width="14" height="14" fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
            Export CSV
          </button>
        )}
      </div>

      {/* Filter bar */}
      <div style={{ background: "#ffffff06", border: "1px solid #ffffff0e", borderRadius: 18, padding: "16px 20px", marginBottom: 24 }}>
        <div style={{ display: "flex", gap: 12, flexWrap: "wrap", alignItems: "center", marginBottom: preset === "custom" ? 14 : 0 }}>
          <svg width="15" height="15" fill="none" stroke="#34c759" strokeWidth="2" viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/></svg>
          <div style={{ display: "flex", gap: 5, flexWrap: "wrap", flex: 1 }}>
            {PRESETS.map(p => (
              <button key={p.id} onClick={() => applyPreset(p.id)} style={{
                ...btnStyle, padding: "5px 12px", fontSize: 11, borderRadius: 99,
                background: preset === p.id ? "#34c759" : "#ffffff0a",
                color: preset === p.id ? "#000" : "#666",
                border: `1px solid ${preset === p.id ? "#34c759" : "#ffffff15"}`,
                fontWeight: preset === p.id ? 700 : 500,
              }}>{p.label}</button>
            ))}
          </div>
          {/* KPI strip */}
          <div style={{ display: "flex", gap: 16, flexShrink: 0 }}>
            {[
              { val: uniqueItems, label: "Items",     color: "#34c759" },
              { val: filteredLog.length, label: "Transfers", color: "#f59e0b" },
              { val: grandTotal,  label: "Units",     color: "#a78bfa" },
            ].map((k, i, arr) => (
              <div key={k.label} style={{ display: "flex", alignItems: "center", gap: 16 }}>
                <div style={{ textAlign: "center" }}>
                  <div style={{ fontFamily: "monospace", fontWeight: 700, fontSize: 18, color: k.color }}>{k.val}</div>
                  <div style={{ fontSize: 10, color: "#444", textTransform: "uppercase", letterSpacing: 0.5 }}>{k.label}</div>
                </div>
                {i < arr.length - 1 && <div style={{ width: 1, height: 32, background: "#ffffff0e" }} />}
              </div>
            ))}
          </div>
        </div>

        {preset === "custom" && (
          <div style={{ display: "flex", gap: 10, flexWrap: "wrap", alignItems: "center", borderTop: "1px solid #ffffff0a", paddingTop: 14 }}>
            <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
              <span style={{ fontSize: 11, color: "#888", width: 24, textAlign: "right" }}>From</span>
              <input type="datetime-local" value={dtFrom} onChange={e => setDtFrom(e.target.value)} style={dtInputStyle} />
            </div>
            <svg width="16" height="8" fill="none" stroke="#444" strokeWidth="1.5" viewBox="0 0 16 8"><path d="M0 4h12M8 1l4 3-4 3" strokeLinecap="round" strokeLinejoin="round"/></svg>
            <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
              <span style={{ fontSize: 11, color: "#888", width: 12 }}>To</span>
              <input type="datetime-local" value={dtTo} onChange={e => setDtTo(e.target.value)} style={dtInputStyle} />
            </div>
            {(dtFrom || dtTo) && (
              <button onClick={() => { setDtFrom(""); setDtTo(""); }} style={{ ...btnStyle, padding: "5px 10px", fontSize: 11, background: "#ffffff0a", color: "#666", border: "1px solid #ffffff15", borderRadius: 8 }}>Reset</button>
            )}
          </div>
        )}
      </div>

      {log.length === 0 ? (
        <div style={{ textAlign: "center", padding: "80px 0" }}>
          <div style={{ fontSize: 48, marginBottom: 14 }}>📊</div>
          <div style={{ fontFamily: "monospace", fontSize: 15, color: "#555" }}>No transfer data yet</div>
          <div style={{ fontSize: 12, color: "#333", marginTop: 6 }}>Transfer stock between locations to generate a report</div>
        </div>
      ) : reportRows.length === 0 ? (
        <div style={{ textAlign: "center", padding: "48px 0", color: "#444" }}>
          <div style={{ fontSize: 32, marginBottom: 10 }}>🔍</div>
          <div style={{ fontFamily: "monospace", fontSize: 13 }}>No transfers in this time range</div>
        </div>
      ) : (
        <>
          {/* Table header */}
          <div style={{ display: "grid", gridTemplateColumns: "2.5fr 1.5fr 1fr 1fr 1fr", gap: 16, padding: "10px 20px", marginBottom: 2 }}>
            {["Item", "Direction", "Transfers", "Units Moved", "% of Total"].map(h => (
              <div key={h} style={{ fontSize: 11, color: "#444", fontWeight: 700, textTransform: "uppercase", letterSpacing: 0.8 }}>{h}</div>
            ))}
          </div>

          <div style={{ border: "1px solid #ffffff0e", borderRadius: 20, overflow: "hidden" }}>
            {reportRows.map((row, ri) => {
              const item = items.find(it => it.id === row.itemId);
              const pct  = grandTotal > 0 ? Math.round((row.totalQty / grandTotal) * 100) : 0;
              const barWidth = grandTotal > 0 ? (row.totalQty / grandTotal) * 100 : 0;

              return (
                <div key={row.itemId} style={{ borderBottom: ri < reportRows.length - 1 ? "1px solid #ffffff08" : "none" }}>
                  {/* Item row */}
                  <div style={{ display: "grid", gridTemplateColumns: "2.5fr 1.5fr 1fr 1fr 1fr", gap: 16, padding: "16px 20px", alignItems: "start", background: ri % 2 === 0 ? "#ffffff03" : "transparent" }}>

                    {/* Item info */}
                    <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
                      <div style={{ width: 40, height: 40, borderRadius: 10, flexShrink: 0, overflow: "hidden", background: "linear-gradient(135deg,#1e1e3a,#2a1a4a)", display: "flex", alignItems: "center", justifyContent: "center" }}>
                        {item?.image ? <img src={item.image} alt="" style={{ width: "100%", height: "100%", objectFit: "cover" }} /> : <span style={{ fontSize: 18 }}>📦</span>}
                      </div>
                      <div>
                        <div style={{ fontWeight: 700, fontSize: 14 }}>{item?.name ?? `Item #${row.itemId}`}</div>
                        <div style={{ fontSize: 10, color: "#555", textTransform: "uppercase", letterSpacing: 0.4 }}>{item?.category ?? "—"}</div>
                      </div>
                    </div>

                    {/* Direction breakdown */}
                    <div style={{ display: "flex", flexDirection: "column", gap: 5 }}>
                      {row.directions.map(dir => {
                        const fromLoc   = locations.find(l => l.id === dir.from);
                        const toLoc     = locations.find(l => l.id === dir.to);
                        const fromColor = LOC_COLORS[dir.from] || "#aaa";
                        const toColor   = LOC_COLORS[dir.to]   || "#aaa";
                        return (
                          <div key={`${dir.from}-${dir.to}`} style={{ display: "flex", alignItems: "center", gap: 5, fontSize: 11 }}>
                            <span style={{ color: fromColor, fontWeight: 600 }}>{fromLoc?.name ?? dir.from}</span>
                            <svg width="12" height="7" viewBox="0 0 16 8" fill="none" stroke="#444" strokeWidth="1.5"><path d="M0 4h12M8 1l4 3-4 3" strokeLinecap="round" strokeLinejoin="round"/></svg>
                            <span style={{ color: toColor, fontWeight: 600 }}>{toLoc?.name ?? dir.to}</span>
                            <span style={{ color: "#555", fontFamily: "monospace", marginLeft: 4 }}>×{dir.qty}</span>
                          </div>
                        );
                      })}
                    </div>

                    {/* Transfer count */}
                    <div style={{ fontFamily: "monospace", fontWeight: 700, fontSize: 15, color: "#f59e0b", paddingTop: 2 }}>{row.directions.reduce((s, d) => s + d.count, 0)}</div>

                    {/* Total qty */}
                    <div style={{ fontFamily: "monospace", fontWeight: 700, fontSize: 18, color: "#34c759", paddingTop: 2 }}>{row.totalQty}</div>

                    {/* % bar */}
                    <div style={{ paddingTop: 4 }}>
                      <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
                        <div style={{ flex: 1, height: 6, background: "#ffffff0a", borderRadius: 99, overflow: "hidden" }}>
                          <div style={{ height: "100%", width: `${barWidth}%`, background: "linear-gradient(90deg,#34c759,#a8e6c0)", borderRadius: 99, transition: "width 0.4s ease" }} />
                        </div>
                        <span style={{ fontFamily: "monospace", fontSize: 11, color: "#34c759", fontWeight: 700, flexShrink: 0 }}>{pct}%</span>
                      </div>
                    </div>
                  </div>
                </div>
              );
            })}

            {/* Grand total footer */}
            <div style={{ display: "grid", gridTemplateColumns: "2.5fr 1.5fr 1fr 1fr 1fr", gap: 16, padding: "14px 20px", background: "#34c75910", borderTop: "1px solid #34c75922" }}>
              <div style={{ fontSize: 12, fontWeight: 700, color: "#34c759" }}>TOTAL</div>
              <div />
              <div style={{ fontFamily: "monospace", fontWeight: 700, fontSize: 15, color: "#f59e0b" }}>{filteredLog.length}</div>
              <div style={{ fontFamily: "monospace", fontWeight: 700, fontSize: 18, color: "#34c759" }}>{grandTotal}</div>
              <div style={{ fontFamily: "monospace", fontSize: 11, color: "#34c759", fontWeight: 700 }}>100%</div>
            </div>
          </div>

          {/* Date range note */}
          {(dtFrom || dtTo) && (
            <div style={{ marginTop: 14, fontSize: 11, color: "#444", fontFamily: "monospace", textAlign: "right" }}>
              Period: {dtFrom ? new Date(dtFrom).toLocaleString() : "—"} → {dtTo ? new Date(dtTo).toLocaleString() : "—"}
            </div>
          )}
        </>
      )}
    </div>
  );
}

// ─── Main App ─────────────────────────────────────────────────────────────────
function App() {
  const [items, setItems]               = useState(initialItems);
  const [locations, setLocations]       = useState(initialLocations);
  const [activeLocTab, setActiveLocTab] = useState("A");
  const [mainTab, setMainTab]           = useState("inventory");
  const [modal, setModal]               = useState(null);
  const [transferItem, setTransferItem] = useState(null);
  const [search, setSearch]             = useState("");
  const [sort, setSort]                 = useState("name");
  const [filterCat, setFilterCat]       = useState("All");
  const [transferLog, setTransferLog]   = useState([]);
  const nextId    = useRef(100);
  const nextLogId = useRef(1);

  const [confirmReset, setConfirmReset] = useState(false);

  const resetAllStock = () => {
    setItems(prev => prev.map(i => {
      const zeroed = Object.fromEntries(Object.keys(i.stock).map(k => [k, 0]));
      return { ...i, stock: zeroed };
    }));
    setConfirmReset(false);
  };
  const activeLoc   = locations.find(l => l.id === activeLocTab);
  const activeColor = LOC_COLORS[activeLocTab] || "#6c63ff";

  const save = (form) => {
    if (form.id) setItems(prev => prev.map(i => i.id === form.id ? form : i));
    else setItems(prev => [...prev, { ...form, id: nextId.current++ }]);
    setModal(null);
  };

  const del    = (id) => setItems(prev => prev.filter(i => i.id !== id));
  const adjust = (id, locId, delta) => setItems(prev => prev.map(i =>
    i.id === id ? { ...i, stock: { ...i.stock, [locId]: Math.max(0, (i.stock[locId] ?? 0) + delta) } } : i
  ));

  const transfer = (itemId, from, to, qty) => {
    setItems(prev => prev.map(i => {
      if (i.id !== itemId) return i;
      return { ...i, stock: { ...i.stock, [from]: (i.stock[from] ?? 0) - qty, [to]: (i.stock[to] ?? 0) + qty } };
    }));
    setTransferLog(prev => [...prev, { id: nextLogId.current++, itemId, from, to, qty, timestamp: Date.now() }]);
    setTransferItem(null);
  };

  const getLocQty = (item, locId) => item.stock[locId] ?? 0;

  // Derive indexed category list from actual items
  const categoryIndex = ["All", ...Array.from(new Set(items.map(i => i.category))).sort()];

  const visible = items
    .filter(i => filterCat === "All" || i.category === filterCat)
    .filter(i => i.name.toLowerCase().includes(search.toLowerCase()))
    .sort((a, b) => sort === "name" ? a.name.localeCompare(b.name) : sort === "qty-asc"
      ? getLocQty(a, activeLocTab) - getLocQty(b, activeLocTab)
      : getLocQty(b, activeLocTab) - getLocQty(a, activeLocTab));

  const locTotal = items.reduce((s, i) => s + getLocQty(i, activeLocTab), 0);
  const locLow   = items.filter(i => { const q = getLocQty(i, activeLocTab); return q > 0 && q <= i.low; }).length;
  const locOut   = items.filter(i => getLocQty(i, activeLocTab) === 0).length;

  const bgColor = mainTab === "log" ? "#f59e0b" : mainTab === "report" ? "#34c759" : activeColor;

  return (
    <div style={{
      minHeight: "100vh", background: "#0a0a18", fontFamily: "system-ui, sans-serif", color: "#f0ede8",
      backgroundImage: `radial-gradient(ellipse 80% 60% at 50% -10%, ${bgColor}16 0%, transparent 70%)`,
    }}>
      <div style={{ padding: "36px 32px 0", maxWidth: 1000, margin: "0 auto" }}>

        {/* ── Top Header ── */}
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", flexWrap: "wrap", gap: 16, marginBottom: 28 }}>
          <div>
            <div style={{ fontSize: 11, color: bgColor, letterSpacing: 3, textTransform: "uppercase", marginBottom: 6, fontWeight: 600 }}>Stock Control</div>
            <h1 style={{ margin: 0, fontSize: 36, fontWeight: 700, lineHeight: 1.1 }}>Inventory</h1>
          </div>
          <div style={{ display: "flex", gap: 10, alignItems: "center", flexWrap: "wrap" }}>
            {/* Main nav tabs */}
            <div style={{ display: "flex", gap: 2, background: "#ffffff08", borderRadius: 12, padding: 3 }}>
              {[
                { id: "inventory", icon: "M3 7h18M3 12h18M3 17h18",                                                                            label: "Inventory" },
                { id: "log",       icon: "M9 12h6M9 16h6M9 8h6M5 3h14a2 2 0 012 2v16a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2z",            label: `Log${transferLog.length > 0 ? ` (${transferLog.length})` : ""}` },
                { id: "report",    icon: "M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z", label: "Report" },
              ].map(t => (
                <button key={t.id} onClick={() => setMainTab(t.id)} style={{
                  ...btnStyle, padding: "8px 16px", fontSize: 12, borderRadius: 10,
                  background: mainTab === t.id ? "#ffffff15" : "transparent",
                  color: mainTab === t.id ? "#f0ede8" : "#555",
                  display: "flex", alignItems: "center", gap: 6,
                }}>
                  <svg width="13" height="13" fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24"><path d={t.icon}/></svg>
                  {t.label}
                </button>
              ))}
            </div>
            {mainTab === "inventory" && (
              <button onClick={() => setModal("new")} style={{
                ...btnStyle, background: `linear-gradient(135deg,${activeColor},${activeColor}bb)`, color: "#fff",
                padding: "10px 22px", fontSize: 14, display: "flex", alignItems: "center", gap: 8,
              }}>
                <svg width="15" height="15" fill="none" stroke="currentColor" strokeWidth="2.5" viewBox="0 0 24 24"><path d="M12 5v14M5 12h14"/></svg>
                Add Item
              </button>
            )}
            <button onClick={() => setConfirmReset(true)} style={{
              ...btnStyle, background: "#ff3b3011", color: "#ff3b30",
              padding: "10px 16px", fontSize: 12, border: "1px solid #ff3b3033",
              display: "flex", alignItems: "center", gap: 6,
            }}>
              <svg width="13" height="13" fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></svg>
              Reset Stock
            </button>
          </div>
        </div>

        {/* ── Reset Confirm Dialog ── */}
        {confirmReset && (
          <div style={{ position: "fixed", inset: 0, background: "rgba(0,0,0,0.75)", backdropFilter: "blur(8px)", display: "flex", alignItems: "center", justifyContent: "center", zIndex: 200, padding: 20 }}
            onClick={() => setConfirmReset(false)}>
            <div onClick={e => e.stopPropagation()} style={{ background: "#10101e", border: "1px solid #ff3b3033", borderRadius: 24, padding: 32, width: "100%", maxWidth: 400, boxShadow: "0 40px 80px rgba(0,0,0,0.7)" }}>
              <div style={{ width: 48, height: 48, borderRadius: 16, background: "#ff3b3018", border: "1px solid #ff3b3033", display: "flex", alignItems: "center", justifyContent: "center", marginBottom: 20 }}>
                <svg width="22" height="22" fill="none" stroke="#ff3b30" strokeWidth="2" viewBox="0 0 24 24"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></svg>
              </div>
              <div style={{ fontSize: 20, fontWeight: 700, marginBottom: 8 }}>Reset All Stock?</div>
              <div style={{ fontSize: 14, color: "#666", lineHeight: 1.6, marginBottom: 28 }}>
                This will set all stock quantities to <span style={{ color: "#ff3b30", fontWeight: 700 }}>0</span> across every item and location. This action cannot be undone.
              </div>
              <div style={{ display: "flex", gap: 10 }}>
                <button onClick={() => setConfirmReset(false)} style={{ ...btnStyle, flex: 1, background: "#ffffff0f", color: "#aaa", border: "1px solid #ffffff18" }}>Cancel</button>
                <button onClick={resetAllStock} style={{ ...btnStyle, flex: 2, background: "linear-gradient(135deg,#ff3b30,#ff6b60)", color: "#fff" }}>
                  Yes, Reset All Stock
                </button>
              </div>
            </div>
          </div>
        )}

        {/* ── Location Tabs + Stats (inventory only) ── */}
        {mainTab === "inventory" && <>
          <div style={{ display: "flex", gap: 4, background: "#ffffff08", borderRadius: 16, padding: 4, width: "fit-content", marginBottom: 24 }}>
            {locations.map(loc => {
              const color  = LOC_COLORS[loc.id] || "#aaa";
              const active = activeLocTab === loc.id;
              return (
                <button key={loc.id} onClick={() => setActiveLocTab(loc.id)} style={{
                  ...btnStyle, padding: "10px 22px", fontSize: 14, borderRadius: 12,
                  background: active ? color : "transparent",
                  color: active ? "#fff" : "#666",
                  display: "flex", alignItems: "center", gap: 8,
                  boxShadow: active ? `0 4px 20px ${color}44` : "none",
                }}>
                  <span style={{ width: 8, height: 8, borderRadius: "50%", background: active ? "#fff" : color }} />
                  <EditableTabName loc={loc} color={color} onRename={renameLocation} />
                </button>
              );
            })}
          </div>

          <div style={{ display: "flex", gap: 12, flexWrap: "wrap" }}>
            {[
              { label: "Units Here",   value: locTotal,     color: activeColor },
              { label: "SKUs",         value: items.length, color: "#60c8ff"  },
              { label: "Low Stock",    value: locLow,       color: "#ff9500"  },
              { label: "Out of Stock", value: locOut,       color: "#ff3b30"  },
            ].map(s => (
              <div key={s.label} style={{ background: "#ffffff07", border: "1px solid #ffffff12", borderRadius: 16, padding: "14px 22px", flex: "1 1 100px" }}>
                <div style={{ fontSize: 28, fontWeight: 700, fontFamily: "monospace", color: s.color }}>{s.value}</div>
                <div style={{ fontSize: 12, color: "#666", marginTop: 2 }}>{s.label}</div>
              </div>
            ))}
          </div>
        </>}
      </div>

      {/* ── Log View ── */}
      {mainTab === "log" && (
        <TransferLogView log={transferLog} locations={locations} items={items} onClear={() => setTransferLog([])} />
      )}

      {/* ── Report View ── */}
      {mainTab === "report" && (
        <ReportView log={transferLog} locations={locations} items={items} />
      )}

      {/* ── Inventory View ── */}
      {mainTab === "inventory" && <>
        <div style={{ maxWidth: 1000, margin: "20px auto 0", padding: "0 32px", display: "flex", flexDirection: "column", gap: 10 }}>
          {/* Search + Sort row */}
          <div style={{ display: "flex", gap: 10, flexWrap: "wrap", alignItems: "center" }}>
            <div style={{ position: "relative", flex: "1 1 180px" }}>
              <svg style={{ position: "absolute", left: 12, top: "50%", transform: "translateY(-50%)" }} width="15" height="15" fill="none" stroke="#555" strokeWidth="2" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg>
              <input value={search} onChange={e => setSearch(e.target.value)} placeholder="Search items…" style={{ ...inputStyle, paddingLeft: 36 }} />
            </div>
            <select value={sort} onChange={e => setSort(e.target.value)} style={{ ...inputStyle, width: "auto", cursor: "pointer" }}>
              <option value="name">Name A–Z</option>
              <option value="qty-asc">Qty ↑</option>
              <option value="qty-desc">Qty ↓</option>
            </select>
          </div>

          {/* Category index pills */}
          <div style={{ display: "flex", gap: 6, flexWrap: "wrap", alignItems: "center" }}>
            <span style={{ fontSize: 11, color: "#444", fontWeight: 700, textTransform: "uppercase", letterSpacing: 0.8, marginRight: 4 }}>Category</span>
            {categoryIndex.map(cat => {
              const active = filterCat === cat;
              const count  = cat === "All" ? items.length : items.filter(i => i.category === cat).length;
              return (
                <button key={cat} onClick={() => setFilterCat(cat)} style={{
                  ...btnStyle, padding: "5px 13px", fontSize: 12, borderRadius: 99,
                  background: active ? activeColor : "#ffffff0a",
                  color: active ? "#fff" : "#666",
                  border: `1px solid ${active ? activeColor : "#ffffff15"}`,
                  display: "flex", alignItems: "center", gap: 5,
                  boxShadow: active ? `0 2px 12px ${activeColor}44` : "none",
                }}>
                  {cat}
                  <span style={{
                    background: active ? "#ffffff33" : "#ffffff0f",
                    borderRadius: 99, padding: "1px 6px", fontSize: 10,
                    fontFamily: "monospace", fontWeight: 700,
                  }}>{count}</span>
                </button>
              );
            })}
          </div>
        </div>

        <div style={{ maxWidth: 1000, margin: "20px auto 60px", padding: "0 32px", display: "grid", gridTemplateColumns: "repeat(2, 1fr)", gap: 20 }}>
          {visible.length === 0 && (
            <div style={{ gridColumn: "1/-1", textAlign: "center", padding: 60, color: "#444" }}>
              <div style={{ fontSize: 40 }}>📦</div>
              <div style={{ marginTop: 12, fontFamily: "monospace" }}>No items found</div>
            </div>
          )}
          {visible.map(item => {
            const locQty = getLocQty(item, activeLocTab);
            return (
              <div key={item.id} style={{
                background: "#ffffff07", border: `1px solid ${activeColor}22`,
                borderRadius: 24, overflow: "hidden", display: "flex", flexDirection: "column",
                transition: "border-color 0.2s, transform 0.15s",
              }}
                onMouseEnter={e => { e.currentTarget.style.borderColor = activeColor + "55"; e.currentTarget.style.transform = "translateY(-3px)"; }}
                onMouseLeave={e => { e.currentTarget.style.borderColor = activeColor + "22"; e.currentTarget.style.transform = "translateY(0)"; }}
              >
                <div style={{ width: "100%", background: "linear-gradient(135deg,#1e1e3a,#2a1a4a)", display: "flex", alignItems: "center", justifyContent: "center", minHeight: item.image ? 0 : 200 }}>
                  {item.image ? <img src={item.image} alt="" style={{ width: "100%", height: "auto", display: "block" }} /> : <span style={{ fontSize: 56 }}>📦</span>}
                </div>

                <div style={{ padding: "18px 20px", display: "flex", flexDirection: "column", gap: 14, flex: 1 }}>
                  <div>
                    <div style={{ fontWeight: 700, fontSize: 17, marginBottom: 3, whiteSpace: "nowrap", overflow: "hidden", textOverflow: "ellipsis" }}>{item.name}</div>
                    <div style={{ fontSize: 11, color: "#555", letterSpacing: 0.5, textTransform: "uppercase", marginBottom: 8 }}>{item.category}</div>
                    <QuantityBadge qty={locQty} low={item.low} />
                  </div>

                  <div style={{ display: "flex", alignItems: "center", gap: 10, background: activeColor + "0d", border: `1px solid ${activeColor}22`, borderRadius: 14, padding: "10px 14px" }}>
                    <span style={{ width: 8, height: 8, borderRadius: "50%", background: activeColor, flexShrink: 0 }} />
                    <span style={{ flex: 1, fontSize: 13, color: "#bbb" }}>{activeLoc.name}</span>
                    <button onClick={() => adjust(item.id, activeLocTab, -1)} style={{ width: 32, height: 32, borderRadius: 9, border: `1px solid ${activeColor}33`, background: activeColor + "11", color: activeColor, cursor: "pointer", fontSize: 18, display: "flex", alignItems: "center", justifyContent: "center" }}>−</button>
                    <span style={{ fontFamily: "monospace", fontWeight: 700, fontSize: 20, minWidth: 36, textAlign: "center" }}>{locQty}</span>
                    <button onClick={() => adjust(item.id, activeLocTab, +1)} style={{ width: 32, height: 32, borderRadius: 9, border: `1px solid ${activeColor}33`, background: activeColor + "11", color: activeColor, cursor: "pointer", fontSize: 18, display: "flex", alignItems: "center", justifyContent: "center" }}>+</button>
                  </div>

                  {locations.filter(l => l.id !== activeLocTab).map(loc => (
                    <div key={loc.id} style={{ display: "flex", alignItems: "center", gap: 8, opacity: 0.4 }}>
                      <span style={{ width: 6, height: 6, borderRadius: "50%", background: LOC_COLORS[loc.id] || "#aaa", flexShrink: 0 }} />
                      <span style={{ fontSize: 12, color: "#777", flex: 1 }}>{loc.name}</span>
                      <span style={{ fontFamily: "monospace", fontSize: 12, color: "#777" }}>{getLocQty(item, loc.id)}</span>
                    </div>
                  ))}

                  <div style={{ display: "flex", gap: 8 }}>
                    <button onClick={() => setTransferItem(item)} style={{ ...btnStyle, flex: 2, background: "#f59e0b11", color: "#f59e0b", padding: "9px", fontSize: 12, border: "1px solid #f59e0b33", display: "flex", alignItems: "center", justifyContent: "center", gap: 6 }}>
                      <svg width="13" height="13" fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24"><path d="M7 16V4m0 0L3 8m4-4l4 4M17 8v12m0 0l4-4m-4 4l-4-4"/></svg>
                      Transfer
                    </button>
                    <button onClick={() => setModal(item)} style={{ ...btnStyle, flex: 1, background: "#ffffff0a", color: "#aaa", padding: "9px", fontSize: 12, border: "1px solid #ffffff18" }}>Edit</button>
                    <button onClick={() => del(item.id)} style={{ ...btnStyle, background: "#ff3b3011", color: "#ff3b30", padding: "9px 14px", fontSize: 12, border: "1px solid #ff3b3033" }}>
                      <svg width="13" height="13" fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6M14 11v6"/></svg>
                    </button>
                  </div>
                </div>
              </div>
            );
          })}
        </div>
      </>}

      {modal && <ItemModal item={modal === "new" ? null : modal} locations={locations} onSave={save} onClose={() => setModal(null)} />}
      {transferItem && <TransferModal key={activeLocTab} item={transferItem} locations={locations} defaultFrom={activeLocTab} onTransfer={transfer} onClose={() => setTransferItem(null)} />}
    </div>
  );
}

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
